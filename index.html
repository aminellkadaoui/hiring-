<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقديم — التوظيف</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
  :root{
    --bg:#f7fcff;--ink:#101418;--muted:#6b7a89;
    --blue:#42a5ff;--blue-2:#1689f5;--mint:#b9f3dc;--mint-2:#8ee8c8;--mint-ink:#0f9c6c;
    --glass:rgba(255,255,255,.6);--glass-line:rgba(255,255,255,.9);
    --soft-shadow:0 12px 30px rgba(27,137,245,.12);--shadow:0 18px 45px rgba(26,132,214,.18);
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    /* unified corner radius system */
    --r-pill:999px;--r-glass:28px;--r-card:22px;--r-md:18px;--r-sm:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;color:var(--ink);line-height:1.85;
    background:
      radial-gradient(circle at 18% 14%, rgba(66,165,255,.08), transparent 30%),
      radial-gradient(circle at 84% 12%, rgba(142,232,200,.16), transparent 28%),
      linear-gradient(135deg,#fafdff 0%,#f4fafd 52%,#f8fdfb 100%);
    -webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}

  .aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .blob{position:absolute;border-radius:999px;filter:blur(60px);opacity:.16;animation:float 30s infinite alternate ease-in-out}
  .blob-a{width:420px;height:420px;right:4%;top:6%;background:rgba(66,165,255,.18)}
  .blob-b{width:520px;height:520px;left:3%;bottom:2%;background:rgba(142,232,200,.28);animation-delay:-6s}
  @keyframes float{0%{transform:translate(0,0) scale(1)}50%{transform:translate(18px,18px) scale(1.02)}100%{transform:translate(-18px,10px) scale(.98)}}

  .stage-wrap{display:grid;grid-template-columns:96px 1fr;gap:8px;max-width:980px;margin:0 auto;padding:0 28px}
  .blue{color:var(--blue-2)} .muted{color:var(--muted)}

  .glass{background:var(--glass);border:1px solid var(--glass-line);
    box-shadow:var(--soft-shadow),inset 0 1px 0 rgba(255,255,255,1);
    backdrop-filter:blur(20px) saturate(145%);-webkit-backdrop-filter:blur(20px) saturate(145%);border-radius:28px}


  /* TIMELINE RAIL */
  .rail{position:relative}
  .rail .track{position:sticky;top:40px;display:flex;flex-direction:column;align-items:center;padding-top:8px}
  .node{display:flex;flex-direction:column;align-items:center;gap:6px}
  .node .tc{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.5px;transition:color .4s}
  .node .knob{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid #cfe3f6;display:grid;place-items:center;transition:.4s}
  .node .knob i{font-size:11px;color:#cfe3f6;transition:.4s}
  .node.active .tc{color:var(--blue-2);font-weight:600}
  .node.active .knob{border-color:var(--blue-2);box-shadow:0 0 0 6px rgba(66,165,255,.16);transform:scale(1.12)}
  .node.active .knob i{color:var(--blue-2)}
  .node.done .knob{background:linear-gradient(135deg,var(--mint),var(--mint-2));border-color:var(--mint-2)}
  .node.done .knob i{color:#0d5c41}
  .node.done .tc{color:var(--mint-ink)}
  .rail .line{width:2px;height:120px;background:linear-gradient(to bottom,#dce9f6,#e7f3ee);position:relative;overflow:hidden}
  .rail .line .fill{position:absolute;inset:0;height:0;background:linear-gradient(to bottom,var(--blue-2),var(--mint-2));transition:height .5s ease}
  .rail .line.filled .fill{height:100%}

  /* STAGES */
  .flow{padding:40px 0 40px}
  section.stage{margin-bottom:30px;scroll-margin-top:24px}
  .stage-card{padding:32px 34px;position:relative;transition:opacity .4s,filter .4s}
  .stage-head{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
  .stage-head .tag{font-family:var(--mono);font-size:12px;color:var(--blue-2);background:rgba(66,165,255,.1);padding:4px 10px;border-radius:8px;letter-spacing:.5px}
  .stage-head h2{font-size:clamp(20px,3vw,28px);font-weight:600;letter-spacing:-.5px}
  .stage-head p{width:100%;color:var(--muted);font-size:14px;margin-top:-12px}
  .locked .stage-card{opacity:.55;filter:saturate(.6)}
  .locked .stage-inner{filter:blur(3px);opacity:.4;pointer-events:none;user-select:none}
  .lock-chip{display:none;position:absolute;top:16px;left:20px;align-items:center;gap:8px;font-size:13px;color:var(--muted);font-weight:600;background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.9);padding:7px 13px;border-radius:999px;box-shadow:var(--soft-shadow)}
  .locked .lock-chip{display:inline-flex}

  /* video */
  .video-frame{position:relative;width:100%;aspect-ratio:16/9;border-radius:20px;overflow:hidden;background:#0c1620;border:1px solid rgba(255,255,255,.6);box-shadow:var(--soft-shadow)}
  .video-frame iframe,.video-frame video{position:absolute;inset:0;width:100%;height:100%;border:0}
  .video-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;cursor:pointer;color:#eaf4ff;
    background:radial-gradient(circle at 50% 42%,rgba(66,165,255,.28),transparent 62%);text-align:center;padding:18px;transition:background .3s ease}
  .video-ph:hover{background:radial-gradient(circle at 50% 42%,rgba(66,165,255,.38),transparent 64%)}
  .play-ring{width:78px;height:78px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:28px;padding-right:4px;
    background:radial-gradient(120% 120% at 50% 24%,#7cc1ff 0%,#1689f5 58%,#0a73fd 100%);border:2px solid rgba(255,255,255,.5);
    box-shadow:0 14px 32px rgba(22,137,245,.42), inset 0 3px 4px rgba(255,255,255,.6), inset 0 -4px 9px rgba(8,60,150,.4);
    transition:transform .3s cubic-bezier(.22,.61,.36,1),box-shadow .3s ease}
  .video-ph:hover .play-ring{transform:scale(1.09);box-shadow:0 18px 40px rgba(22,137,245,.52), inset 0 3px 4px rgba(255,255,255,.6), inset 0 -4px 9px rgba(8,60,150,.4)}
  .video-ph span{font-size:16px;font-weight:700;letter-spacing:.3px}
  .scrubber{margin-top:18px;display:flex;align-items:center;gap:14px}
  .scrub-track{flex:1;height:8px;border-radius:999px;background:#e6eef6;position:relative}
  .scrub-fill{position:absolute;inset:0;width:0;border-radius:999px;background:linear-gradient(90deg,var(--mint-2),var(--blue-2));transition:width .25s}
  .scrub-knob{position:absolute;top:50%;right:0;transform:translate(50%,-50%);width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--blue-2);box-shadow:0 4px 12px rgba(22,137,245,.4);transition:right .25s}
  .scrub-tc{font-family:var(--mono);font-size:13px;color:var(--muted);min-width:46px;text-align:left}

  /* form */
  .field{margin-bottom:18px}
  .field label{display:block;font-size:15px;font-weight:500;margin-bottom:8px}
  .field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.85);color:var(--ink);
    font-family:inherit;font-size:15px;padding:14px 17px;border-radius:16px;transition:border .25s,box-shadow .25s;box-shadow:inset 0 1px 2px rgba(16,20,24,.03)}
  .field textarea{min-height:100px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(66,165,255,.15)}
  .field select{cursor:pointer}
  /* text options — clear pressable cards in a balanced grid */
  .choice{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .chip{display:flex;align-items:center;justify-content:center;gap:11px;padding:15px 16px;border-radius:var(--r-md);background:rgba(255,255,255,.6);
    border:1.5px solid rgba(255,255,255,.92);cursor:pointer;font-size:14.5px;font-weight:600;user-select:none;color:var(--ink);text-align:center;box-shadow:var(--soft-shadow);
    transition:transform .28s cubic-bezier(.22,.61,.36,1),border-color .25s,background .25s,color .25s}
  .chip:hover{border-color:rgba(66,165,255,.5);background:rgba(255,255,255,.92);transform:translateY(-3px)}
  .chip input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
  .chip .tick{width:24px;height:24px;border-radius:8px;border:2px solid #cdd9e6;display:grid;place-items:center;flex:0 0 24px;color:#fff;font-size:13px;transition:background .25s,border-color .25s}
  .chip.radio .tick{border-radius:50%}
  .chip .tick i{opacity:0;transform:scale(.5);transition:transform .25s cubic-bezier(.22,.61,.36,1),opacity .2s}
  .chip.on{border-color:var(--blue-2);background:rgba(66,165,255,.12);color:var(--blue-2)}
  .chip.on .tick{background:var(--blue-2);border-color:var(--blue-2)}
  .chip.on .tick i{opacity:1;transform:scale(1)}
  .chip .lbl{line-height:1.3}
  @media(max-width:520px){ .choice{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:340px){ .choice{grid-template-columns:1fr} }

  /* vertical icon cards — uniform size, icon on top, label below, tick fixed top */
  /* container: grouped from the right (RTL), fixed gap, never spread full width */
  .cards{display:flex;flex-wrap:wrap;justify-content:flex-start;gap:14px}
  .opt-card{position:relative;flex:0 0 auto;width:130px;height:134px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    padding:44px 12px 16px;border-radius:var(--r-card);background:rgba(255,255,255,.62);border:1.5px solid rgba(255,255,255,.92);cursor:pointer;box-shadow:var(--soft-shadow);text-align:center;
    transition:transform .3s cubic-bezier(.22,.61,.36,1),border-color .25s,background .25s,box-shadow .25s}
  .opt-card:hover{border-color:rgba(66,165,255,.5);background:rgba(255,255,255,.92);transform:translateY(-4px)}
  .opt-card input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
  .opt-tick{position:absolute;top:14px;right:14px;width:20px;height:20px;border-radius:7px;border:2px solid #cdd9e6;background:#fff;display:grid;place-items:center;color:#fff;font-size:11px;z-index:2;
    transition:background .25s,border-color .25s}
  .opt-card.radio .opt-tick{border-radius:50%}
  .opt-tick i{opacity:0;transform:scale(.5);transition:transform .25s cubic-bezier(.22,.61,.36,1),opacity .2s}
  .opt-logo-wrap{width:38px;height:38px;display:grid;place-items:center;flex:0 0 38px;transition:transform .3s cubic-bezier(.22,.61,.36,1)}
  .opt-card:hover .opt-logo-wrap{transform:scale(1.12)}
  .opt-logo-wrap img{width:36px;height:36px;object-fit:contain;display:block}
  .opt-logo-wrap i{font-size:32px;color:var(--blue-2)}
  .opt-lbl{font-size:13px;font-weight:600;line-height:1.25;color:var(--ink);min-height:33px;display:flex;align-items:center;justify-content:center}
  .opt-card.on{border-color:var(--blue-2);background:rgba(66,165,255,.12);box-shadow:0 0 0 3px rgba(66,165,255,.14),var(--soft-shadow)}
  .opt-card.on .opt-tick{background:var(--blue-2);border-color:var(--blue-2)}
  .opt-card.on .opt-tick i{opacity:1;transform:scale(1)}
  .opt-card.on .opt-lbl{color:var(--blue-2)}
  .other-in{margin-top:12px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:8px;
    background:linear-gradient(180deg,#5cb4ff 0%,#1689f5 52%,#0f78e6 100%);color:#fff;font-family:inherit;font-weight:600;font-size:16px;
    padding:15px 30px;border:1px solid rgba(255,255,255,.35);border-radius:999px;cursor:pointer;transition:transform .28s cubic-bezier(.22,.61,.36,1),box-shadow .28s,filter .25s;text-decoration:none;
    box-shadow:0 14px 30px rgba(22,137,245,.32), inset 0 2px 2px rgba(255,255,255,.6), inset 0 -3px 7px rgba(8,70,150,.4)}
  .btn:hover{transform:translateY(-2px);filter:brightness(1.05);box-shadow:0 18px 40px rgba(22,137,245,.42), inset 0 2px 2px rgba(255,255,255,.65), inset 0 -3px 7px rgba(8,70,150,.4)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{background:#e2eaf2;color:var(--muted);cursor:not-allowed;border-color:rgba(255,255,255,.6);box-shadow:inset 0 1px 2px rgba(255,255,255,.8);transform:none;filter:none}
  .btn.green{background:linear-gradient(180deg,#a7f0cf 0%,#3fbf8e 52%,#0f9c6c 100%);border-color:rgba(255,255,255,.4);
    box-shadow:0 14px 30px rgba(15,156,108,.3), inset 0 2px 2px rgba(255,255,255,.6), inset 0 -3px 7px rgba(8,110,75,.4)}
  .btn.ghost{background:rgba(255,255,255,.7);color:var(--ink);border:1px solid rgba(255,255,255,.9);box-shadow:var(--soft-shadow)}
  .btn.outline{background:#fff;color:var(--blue-2);border:1px solid var(--blue-2);box-shadow:var(--soft-shadow);max-width:360px;margin:0 auto}
  .btn.outline:hover{background:rgba(66,165,255,.06)}
  .btn.shine{position:relative;overflow:hidden}
  .btn.shine::after{content:"";position:absolute;top:0;left:-65%;width:45%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-22deg);animation:sweep 2.8s infinite}
  @keyframes sweep{0%{left:-65%}60%,100%{left:140%}}
  .field.invalid input,.field.invalid select,.field.invalid textarea{border-color:#e05656!important;box-shadow:0 0 0 3px rgba(224,86,86,.16)!important}
  .field.invalid .chip{border-color:rgba(224,86,86,.5)}
  .field.invalid label{color:#c0392b}

  /* trial / consent */
  .trial-intro{padding:22px;border-radius:20px;margin-bottom:22px;text-align:center;
    background:linear-gradient(135deg,rgba(66,165,255,.08),rgba(142,232,200,.12));border:1px solid rgba(66,165,255,.18)}
  .trial-intro .t-h{font-size:17px;font-weight:600;margin-bottom:14px}
  .consent{text-align:center}
  .consent-q{font-size:18px;font-weight:600;margin-bottom:16px}
  .consent-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:480px;margin:0 auto}
  .consent-btns .btn{margin-top:0}
  .decline-box{max-width:540px;margin:18px auto 0;text-align:right}

  .success{text-align:center;padding:26px 10px}
  .success .check{width:80px;height:80px;border-radius:50%;display:grid;place-items:center;margin:0 auto 20px;font-size:38px;color:#fff;
    background:linear-gradient(135deg,var(--mint-2),var(--mint-ink));box-shadow:0 16px 38px rgba(15,156,108,.4)}
  .success h2{font-size:26px;margin-bottom:12px}
  .success .btn{max-width:360px;margin:22px auto 0}

  footer{position:relative;z-index:2;text-align:center;padding:46px 20px 36px;color:var(--muted);font-size:13px;font-family:var(--mono);letter-spacing:.5px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);z-index:99;
    background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.95);color:var(--ink);
    padding:13px 22px;border-radius:16px;font-size:15px;font-weight:500;opacity:0;pointer-events:none;
    box-shadow:var(--shadow);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);transition:opacity .3s,transform .3s;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.ok{border-color:rgba(142,232,200,.9)} .toast.err{border-color:rgba(254,202,202,.95)}

  @media(max-width:820px){
    .stage-wrap{grid-template-columns:1fr;padding:0 16px}
    .rail{display:none}
    .flow{padding:26px 0 30px}
    .stage-card{padding:22px 18px;border-radius:22px}
    section.stage{margin-bottom:20px}
  }
  @media(max-width:520px){
    .stage-card{padding:18px 14px;border-radius:20px}
    .stage-head h2{font-size:19px}
    .stage-head .tag{font-size:11px;padding:3px 8px}
    .video-frame{border-radius:14px}
    .scrubber{gap:10px;margin-top:14px}
    .scrub-tc{font-size:12px;min-width:38px}
    .btn{font-size:15px;padding:13px 20px}
    .field label{font-size:14px}
    .field input,.field select,.field textarea{font-size:14px;padding:12px 13px;border-radius:12px}
    .check-opt{font-size:13px;padding:10px 13px}
    .consent-btns{grid-template-columns:1fr}
    .consent-q{font-size:16px}
    .success h2{font-size:22px}
    .toast{font-size:14px;padding:12px 18px;bottom:16px}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>

<div class="aurora"><div class="blob blob-a"></div><div class="blob blob-b"></div></div>

<div class="stage-wrap flow">

  <div class="rail">
    <div class="track">
      <div class="node active" id="tl-1"><span class="tc">00:01</span><span class="knob"><i class="ph-bold ph-play"></i></span></div>
      <div class="line" id="ln-1"><span class="fill"></span></div>
      <div class="node" id="tl-2"><span class="tc">00:02</span><span class="knob"><i class="ph-bold ph-pencil-simple-line"></i></span></div>
      <div class="line" id="ln-2"><span class="fill"></span></div>
      <div class="node" id="tl-3"><span class="tc">00:03</span><span class="knob"><i class="ph-bold ph-film-slate"></i></span></div>
      <div class="line" id="ln-3"><span class="fill"></span></div>
      <div class="node" id="tl-done"><span class="tc">تم</span><span class="knob"><i class="ph-bold ph-check"></i></span></div>
    </div>
  </div>

  <div>

    <!-- STAGE 1: VIDEO -->
    <section class="stage" id="stage1">
      <div class="glass stage-card">
        <div class="stage-inner">
          <div class="video-frame" id="videoBox">
            <div class="video-ph" id="videoPh">
              <div class="play-ring"><i class="ph-fill ph-play"></i></div>
              <span>شاهد الفيديو الآن</span>
            </div>
          </div>
          <div class="scrubber">
            <div class="scrub-track"><div class="scrub-fill" id="vidFill"><span class="scrub-knob"></span></div></div>
            <div class="scrub-tc" id="vidPct">0%</div>
          </div>
          <button class="btn" id="videoNextBtn" disabled onclick="goForm()">أكمل المشاهدة للمتابعة</button>
        </div>
      </div>
    </section>

    <!-- STAGE 2: FORM -->
    <section class="stage" id="stage2">
      <div class="glass stage-card">
        <span class="lock-chip"><i class="ph-bold ph-lock-simple"></i> أكمل الفيديو أولاً</span>
        <div class="stage-head"><span class="tag">STEP 02</span><h2>قدّم معلوماتك</h2><p>دقيقتان فقط — حتى لو لم تنجز ترايل بعد.</p></div>
        <div class="stage-inner" id="formWrap">
          <form id="applyForm" onsubmit="return false"></form>
          <button class="btn" id="submitBtn" onclick="submitForm()">إرسال ومتابعة</button>
        </div>
      </div>
    </section>

    <!-- STAGE 3: TRIAL + CONSENT -->
    <section class="stage" id="stage3">
      <div class="glass stage-card">
        <span class="lock-chip"><i class="ph-bold ph-lock-simple"></i> أكمل الفورم أولاً</span>
        <div class="stage-head"><span class="tag">STEP 03</span><h2>الترايل</h2></div>
        <div class="stage-inner" id="trialWrap"></div>
      </div>
    </section>

  </div>
</div>

<footer>© <span dir="ltr">aminellkadaoui</span> · نظام التوظيف</footer>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCZhafPqlaBoapQ8df0Y_U8KzKyHKsNE-k",
    authDomain: "hiring-9104c.firebaseapp.com",
    projectId: "hiring-9104c",
    storageBucket: "hiring-9104c.firebasestorage.app",
    messagingSenderId: "300070302147",
    appId: "1:300070302147:web:f6af240cb1f74763308d76"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const DEFAULT_CONTENT = {
    notionUrl: "",
    questions: [
      {id:"name",label:"الاسم الكامل، البلد والمدينة",placeholder:"مثال: أحمد العلي — المغرب، الدار البيضاء",type:"text",required:true},
      {id:"phone",label:"رقم واتساب",placeholder:"+212 6 00 00 00 00",type:"text",required:true},
      {id:"portfolio",label:"رابط البورتفوليو",placeholder:"https://...",type:"url",required:true},
      {id:"software",label:"البرامج التي تتقنها",type:"checkbox",options:["Premiere Pro","After Effects","Figma","DaVinci Resolve"],required:true},
      {id:"price",label:"السعر المتوقع لكل فيديو (بالدولار)",placeholder:"مثال: 30",type:"number",required:true},
      {id:"payment",label:"طريقة الدفع المفضلة (يمكن اختيار أكثر من واحدة)",type:"checkbox",options:["PayPal","Binance","بنك محلي","أخرى"],required:true},
      {id:"experience",label:"هل سبق أن عملت مع وكالة أو صانع محتوى؟",placeholder:"نعم — مع... / لا، هذه أول مرة",type:"text",required:true},
      {id:"availability",label:"ما مدى توفّرك للعمل؟",type:"radio",options:["متفرّغ بدوام كامل","متاح بدوام جزئي","متاح أوقاتاً محددة"],required:true},
      {id:"setup",label:"هل لديك إنترنت مستقر وجهاز مناسب للمونتاج؟",type:"radio",options:["نعم، الاثنان متوفّران","إنترنت مستقر فقط","جهاز مناسب فقط","لا، أحتاج تحسيناً"],required:true},
      {id:"ideal",label:"كيف يبدو العمل المثالي بالنسبة لك؟",placeholder:"اشرح باختصار...",type:"textarea",required:true},
      {id:"why",label:"لماذا تريد العمل معنا؟",placeholder:"اشرح باختصار...",type:"textarea",required:true}
    ],
    scorecard: [{label:"الالتزام",max:40},{label:"الجودة",max:35},{label:"التواصل",max:25}]
  };
  let content = DEFAULT_CONTENT;
  let appDocId = null;

  const LOGO = {
    'figma':'figma','after effects':'aftereffects','premiere pro':'premiere','premiere':'premiere',
    'davinci resolve':'davinci','davinci':'davinci','davinci resolve studio':'davinci',
    'paypal':'paypal','binance':'binance','notion':'notion'
  };
  function optIcon(label){
    const k=String(label).trim().toLowerCase();
    if(LOGO[k]) return '<img src="logos/'+LOGO[k]+'.svg" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
    if(k.includes('بنك')) return '<i class="ph-bold ph-bank"></i>';
    if(k==='أخرى') return '<i class="ph-bold ph-dots-three-outline"></i>';
    return '<i class="ph-bold ph-circle"></i>';
  }
  function hasIcons(opts){ return (opts||[]).some(o=>{ const k=String(o).trim().toLowerCase(); return LOGO[k]||k.includes('بنك')||k==='أخرى'; }); }

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function toast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+(type||''); setTimeout(()=>{t.className='toast';},3200); }

  function sanitize(c){ (c.questions||[]).forEach(q=>{ if(Array.isArray(q.options)) q.options=q.options.filter(o=>String(o).trim().toLowerCase()!=='wise'); }); return c; }
  function renderForm(c){
    document.getElementById('applyForm').innerHTML=(c.questions||[]).filter(q=>!q.hidden).map(q=>{
      const id='f_'+q.id, ph=esc(q.placeholder||'');
      let input;
      const chip=(o,kind)=>'<label class="chip'+(kind==='radio'?' radio':'')+'"><input type="'+kind+'" name="'+id+'" value="'+esc(o)+'"><span class="tick"><i class="ph-bold ph-check"></i></span><span class="lbl">'+esc(o)+'</span></label>';
      const card=(o,kind)=>'<label class="opt-card'+(kind==='radio'?' radio':'')+'"><input type="'+kind+'" name="'+id+'" value="'+esc(o)+'"><span class="opt-tick"><i class="ph-bold ph-check"></i></span><span class="opt-logo-wrap">'+optIcon(o)+'</span><span class="opt-lbl">'+esc(o)+'</span></label>';
      if(q.type==='textarea') input='<textarea id="'+id+'" placeholder="'+ph+'"></textarea>';
      else if(q.type==='select') input='<select id="'+id+'"><option value="">اختر...</option>'+(q.options||[]).map(o=>'<option>'+esc(o)+'</option>').join('')+'</select>';
      else if(q.type==='checkbox'||q.type==='radio'){
        const useCards=hasIcons(q.options);
        input='<div class="'+(useCards?'cards':'choice')+'">'+(q.options||[]).map(o=>useCards?card(o,q.type):chip(o,q.type)).join('')+'</div>';
        if(q.type==='checkbox' && (q.options||[]).includes('أخرى')) input+='<input type="text" class="other-in" id="'+id+'_other" placeholder="اذكر الطريقة الأخرى..." style="display:none">';
      }
      else input='<input type="'+esc(q.type||'text')+'" id="'+id+'" placeholder="'+ph+'"'+(q.type==='number'?' min="0"':'')+'>';
      return '<div class="field" data-qid="'+esc(q.id)+'"><label>'+esc(q.label)+'</label>'+input+'</div>';
    }).join('');
    document.querySelectorAll('.chip input, .opt-card input').forEach(inp=>inp.addEventListener('change',()=>{
      const sel='.chip,.opt-card';
      if(inp.type==='radio'){
        document.querySelectorAll('input[name="'+inp.name+'"]').forEach(o=>{ const c=o.closest(sel); if(c) c.classList.toggle('on',o.checked); });
      } else {
        const c=inp.closest(sel); if(c) c.classList.toggle('on',inp.checked);
        if(inp.value==='أخرى'){ const ot=document.getElementById(inp.name+'_other'); if(ot) ot.style.display=inp.checked?'block':'none'; }
      }
    }));
  }
  renderForm(DEFAULT_CONTENT);

  /* ---------- video ---------- */
  function setProgress(pct){
    pct=Math.max(0,Math.min(100,Math.round(pct)));
    document.getElementById('vidFill').style.width=pct+'%';
    document.getElementById('vidPct').textContent=pct+'%';
    const btn=document.getElementById('videoNextBtn');
    if(pct>=95){ btn.disabled=false; btn.textContent='تابع إلى التقديم'; }
  }
  let videoUrl='', ytPlayer=null, ytTimer=null, started=false;
  function ytId(s){ const m=String(s).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/|live\/))([\w-]{11})/); if(m) return m[1]; const b=String(s).trim().match(/^[\w-]{11}$/); return b?b[0]:''; }
  function isYouTube(s){ return /youtu\.?be|youtube\.com/i.test(s); }
  function vErr(msg){ document.getElementById('videoBox').innerHTML='<div class="video-ph" style="cursor:default"><div class="play-ring" style="background:rgba(255,255,255,.12)"><i class="ph-bold ph-warning"></i></div><span>'+msg+'</span></div>'; }

  function startVideo(){
    if(started) return;
    if(!videoUrl){ toast('لم يتم ضبط رابط الفيديو بعد','err'); return; }
    started=true; document.getElementById('videoPh').style.display='none';
    if(isYouTube(videoUrl)){
      const id=ytId(videoUrl);
      if(!id){ toast('رابط يوتيوب غير صحيح','err'); started=false; document.getElementById('videoPh').style.display='flex'; return; }
      const holder=document.createElement('div'); holder.id='ytplayer'; document.getElementById('videoBox').appendChild(holder);
      const make=()=>{ ytPlayer=new YT.Player('ytplayer',{videoId:id,playerVars:{autoplay:1,rel:0,modestbranding:1,controls:1,playsinline:1},events:{
        onReady:e=>e.target.playVideo(),
        onStateChange:e=>{ if(e.data===YT.PlayerState.PLAYING){ clearInterval(ytTimer); ytTimer=setInterval(()=>{const d=ytPlayer.getDuration(); if(d>0) setProgress(ytPlayer.getCurrentTime()/d*100);},500);} else if(e.data===YT.PlayerState.ENDED){ setProgress(100); clearInterval(ytTimer);} },
        onError:()=>{ clearInterval(ytTimer); vErr('تعذّر تشغيل هذا الفيديو من يوتيوب.<br>تأكد أنه ليس خاصاً ويسمح بالتضمين، أو استخدم رابط mp4 مباشر.'); }
      }}); };
      if(window.YT && window.YT.Player) make();
      else { window.onYouTubeIframeAPIReady=make; const s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s); }
    } else {
      const v=document.createElement('video');
      v.src=videoUrl; v.controls=true; v.autoplay=true; v.playsInline=true;
      v.setAttribute('controlsList','nodownload noplaybackrate'); v.setAttribute('disablePictureInPicture','');
      v.addEventListener('contextmenu',e=>e.preventDefault());
      let maxWatched=0;
      v.addEventListener('timeupdate',()=>{ if(!v.seeking) maxWatched=Math.max(maxWatched,v.currentTime); if(v.duration>0) setProgress(v.currentTime/v.duration*100); });
      v.addEventListener('seeking',()=>{ if(v.currentTime>maxWatched+0.5) v.currentTime=maxWatched; });
      v.addEventListener('ratechange',()=>{ if(v.playbackRate>1) v.playbackRate=1; });
      v.addEventListener('ended',()=>setProgress(100));
      v.addEventListener('error',()=>vErr('تعذّر تحميل الفيديو — تأكد أن الرابط مباشر (mp4) ويسمح بالتشغيل.'));
      document.getElementById('videoBox').appendChild(v);
    }
  }

  /* ---------- transitions ---------- */
  function setNode(id,state){ const n=document.getElementById(id); n.classList.remove('active','done'); if(state) n.classList.add(state); }
  function fillLine(id){ document.getElementById(id).classList.add('filled'); }
  function goForm(){
    document.getElementById('stage2').classList.remove('locked');
    setNode('tl-1','done'); fillLine('ln-1'); setNode('tl-2','active');
    document.getElementById('stage2').scrollIntoView({behavior:'smooth',block:'start'});
  }

  /* ---------- submit form ---------- */
  function isUrl(v){ try{ const u=new URL(v); return /^https?:$/.test(u.protocol); }catch(e){ return false; } }
  let appDocPromise=null, submitted=false;
  function submitForm(){
    if(submitted) return;                       // منع الإرسال المزدوج
    const answers={}; let firstBad=null;
    (content.questions||[]).filter(q=>!q.hidden).forEach(q=>{
      let val;
      if(q.type==='checkbox'){
        let vals=[...document.querySelectorAll('input[name="f_'+q.id+'"]:checked')].map(c=>c.value);
        if(vals.includes('أخرى')){ const ot=document.getElementById('f_'+q.id+'_other'); if(ot&&ot.value.trim()) vals=vals.map(v=>v==='أخرى'?('أخرى: '+ot.value.trim()):v); }
        val=vals.join('، ');
      } else if(q.type==='radio'){ const r=document.querySelector('input[name="f_'+q.id+'"]:checked'); val=r?r.value:''; }
      else { const el=document.getElementById('f_'+q.id); val=el?String(el.value).trim():''; }
      answers[q.id]=val;
      const field=document.querySelector('.field[data-qid="'+q.id+'"]');
      let bad=false;
      if(q.required && !val) bad=true;
      else if(q.type==='url' && val && !isUrl(val)) bad=true;
      if(field) field.classList.toggle('invalid',bad);
      if(bad && !firstBad) firstBad=field;
    });
    if(firstBad){ toast('تحقّق من الحقول المظلّلة بالأحمر','err'); if(firstBad.scrollIntoView) firstBad.scrollIntoView({behavior:'smooth',block:'center'}); return; }
    submitted=true;
    const btn=document.getElementById('submitBtn');
    btn.disabled=true; btn.innerHTML='<i class="ph-bold ph-check-circle"></i> تم الإرسال — تابع للأسفل';
    const fw=document.getElementById('formWrap'); if(fw){ fw.style.opacity='.6'; fw.style.pointerEvents='none'; }
    toast('تم استلام معلوماتك ✓','ok');
    // أرسل في الخلفية وتابع فوراً — لا انتظار
    appDocId=null;
    appDocPromise=addDoc(collection(db,'applicants'), Object.assign({date:new Date().toISOString(),status:'pending',rating:null,notes:'',trialConsent:null},answers))
      .then(ref=>{ appDocId=ref.id; }).catch(e=>{ console.error('save failed',e); });
    unlockTrial();
  }
  async function ensureDoc(){ if(appDocId) return appDocId; if(appDocPromise){ try{ await appDocPromise; }catch(e){} } return appDocId; }

  /* ---------- trial stage ---------- */
  function renderTrial(){
    let h='<div class="trial-intro"><div class="t-h">موضوع الترايل وتفاصيله الكاملة على صفحة Notion</div>';
    if(content.notionUrl) h+='<a class="btn shine" href="'+esc(content.notionUrl)+'" target="_blank" rel="noopener"><i class="ph-bold ph-notion-logo"></i> افتح تفاصيل الترايل الآن <i class="ph-bold ph-arrow-left"></i></a>';
    else h+='<p class="muted">سنشارك تفاصيل الترايل معك قريباً.</p>';
    h+='</div>';
    h+='<div class="consent"><p class="consent-q">هل توافق على تنفيذ هذا الترايل؟</p>'+
       '<div class="consent-btns">'+
         '<button class="btn green" id="agreeBtn"><i class="ph-bold ph-check"></i> أوافق على العمل عليه</button>'+
         '<button class="btn ghost" id="declineBtn"><i class="ph-bold ph-x"></i> لا أوافق</button>'+
       '</div>'+
       '<div class="decline-box" id="declineBox" style="display:none">'+
         '<div class="field"><label>ما سبب عدم رغبتك في تنفيذه؟</label><textarea id="declineReason" placeholder="اكتب السبب بصراحة — يساعدنا على التحسين."></textarea></div>'+
         '<button class="btn" id="sendDeclineBtn">إرسال السبب</button>'+
       '</div></div>';
    const w=document.getElementById('trialWrap'); w.innerHTML=h;
    document.getElementById('agreeBtn').addEventListener('click', agreeTrial);
    document.getElementById('declineBtn').addEventListener('click', ()=>{ document.getElementById('declineBox').style.display='block'; document.getElementById('declineReason').focus(); });
    document.getElementById('sendDeclineBtn').addEventListener('click', sendDecline);
  }
  function unlockTrial(){
    renderTrial();
    document.getElementById('stage3').classList.remove('locked');
    setNode('tl-2','done'); fillLine('ln-2'); setNode('tl-3','active');
    document.getElementById('stage3').scrollIntoView({behavior:'smooth',block:'start'});
  }
  function trialDone(title,sub){
    document.getElementById('trialWrap').innerHTML='<div class="success"><div class="check"><i class="ph-bold ph-check"></i></div><h2>'+title+'</h2><p class="muted">'+sub+'</p>'+
      (content.notionUrl?'<a class="btn shine" href="'+esc(content.notionUrl)+'" target="_blank" rel="noopener"><i class="ph-bold ph-notion-logo"></i> افتح تفاصيل الترايل</a>':'')+'</div>';
    setNode('tl-3','done'); fillLine('ln-3'); setNode('tl-done','done');
  }
  async function agreeTrial(){
    trialDone('رائع — بالتوفيق في الترايل!','نتطلّع لمشاهدة عملك. التفاصيل الكاملة على صفحة Notion.');
    const id=await ensureDoc();
    try{ if(id) await updateDoc(doc(db,'applicants',id),{trialConsent:'agreed'}); }catch(e){ console.error(e); }
  }
  async function sendDecline(){
    const reason=document.getElementById('declineReason').value.trim();
    if(!reason){ toast('اكتب السبب أولاً','err'); return; }
    trialDone('شكراً على صراحتك','سجّلنا ملاحظتك، وقد نتواصل معك مستقبلاً.');
    const id=await ensureDoc();
    try{ if(id) await updateDoc(doc(db,'applicants',id),{trialConsent:'declined',declineReason:reason}); }catch(e){ console.error(e); }
  }

  /* ---------- load ---------- */
  async function loadAll(){
    try{ const s=await getDoc(doc(db,'config','settings')); if(s.exists()) videoUrl=s.data().videoUrl||''; }catch(e){ console.error(e); }
    try{ const c=await getDoc(doc(db,'config','content')); if(c.exists()){ content=sanitize(Object.assign({},DEFAULT_CONTENT,c.data())); renderForm(content); } }catch(e){ console.error(e); }
  }

  const formEl=document.getElementById('applyForm');
  formEl.addEventListener('input',e=>{ const f=e.target.closest('.field'); if(f) f.classList.remove('invalid'); });
  formEl.addEventListener('change',e=>{ const f=e.target.closest('.field'); if(f) f.classList.remove('invalid'); });

  document.getElementById('stage2').classList.add('locked');
  document.getElementById('stage3').classList.add('locked');
  document.getElementById('videoPh').addEventListener('click', startVideo);
  window.startVideo=startVideo; window.goForm=goForm; window.submitForm=submitForm;
  loadAll();
</script>
</body>
</html>
